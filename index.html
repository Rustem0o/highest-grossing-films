<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Films</title>

<style>
body {
    font-family: Arial;
    background: #e0e0e0;
    padding: 20px;
}

.box {
    background: #e0e0e0;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 8px 8px 15px #bebebe,
               -8px -8px 15px #ffffff;
    margin-bottom: 20px;
}

input, select, button {
    padding: 8px;
    border-radius: 8px;
    border: none;
    margin: 5px;
}

button {
    box-shadow: 5px 5px 10px #bebebe,
               -5px -5px 10px #ffffff;
}

table {
    width: 100%;
}

td, th {
    padding: 10px;
}

.popcorn {
    position: fixed;
    right: 20px;
    bottom: 20px;
    font-size: 40px;
}
</style>

</head>

<body>

<h1>Films</h1>

<div class="box">
<input id="search" placeholder="search">
<select id="year">
<option value="all">all</option>
</select>

<button onclick="sortTitle()">title</button>
<button onclick="sortYear()">year</button>
<button onclick="sortMoney()">money</button>
</div>

<div class="box">
<table>
<tr>
<th>title</th>
<th>year</th>
<th>director</th>
<th>money</th>
<th>country</th>
</tr>
<tbody id="t"></tbody>
</table>
</div>

<div class="popcorn">🍿</div>

<script>

let data = []
let cur = []

fetch("films.json")
.then(r=>r.json())
.then(d=>{
    data = d
    cur = [...data]
    fillYears()
    draw(cur)
})

function draw(arr){
    let html=""
    for(let f of arr){
        html+=`
        <tr>
        <td>${f.title}</td>
        <td>${f.release_year}</td>
        <td>${f.director}</td>
        <td>${f.box_office}</td>
        <td>${f.country}</td>
        </tr>`
    }
    document.getElementById("t").innerHTML=html
}

function fillYears(){
    let y=document.getElementById("year")
    let ys=[...new Set(data.map(f=>f.release_year))]
    for(let i of ys){
        let o=document.createElement("option")
        o.value=i
        o.text=i
        y.appendChild(o)
    }
}

function update(){
    let s=document.getElementById("search").value.toLowerCase()
    let y=document.getElementById("year").value

    cur=data.filter(f=>{
        return f.title.toLowerCase().includes(s) &&
        (y=="all"||f.release_year==y)
    })
    draw(cur)
}

function sortTitle(){
    cur.sort((a,b)=>a.title.localeCompare(b.title))
    draw(cur)
}

function sortYear(){
    cur.sort((a,b)=>a.release_year-b.release_year)
    draw(cur)
}

function sortMoney(){
    cur.sort((a,b)=>{
        let x=parseInt(a.box_office.replace(/[$,]/g,""))
        let y=parseInt(b.box_office.replace(/[$,]/g,""))
        return y-x
    })
    draw(cur)
}

document.getElementById("search").oninput=update
document.getElementById("year").onchange=update

</script>

</body>
</html>
